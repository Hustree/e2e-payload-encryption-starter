# Quarkus Configuration
quarkus.http.port=8080

# CORS Configuration - Allow specific origin for development
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:3000
quarkus.http.cors.headers=origin, content-type, accept, authorization, x-requested-with, x-frontend-public-key
quarkus.http.cors.methods=GET, POST, PUT, DELETE, OPTIONS, HEAD
quarkus.http.cors.exposed-headers=*
quarkus.http.cors.access-control-max-age=24H

# Encryption Configuration
encryption.key=my-super-secret-aes-256-key-32ch

# Logging
quarkus.log.level=INFO
quarkus.log.category."com.example".level=DEBUG

# Jackson Configuration
quarkus.jackson.fail-on-unknown-properties=false